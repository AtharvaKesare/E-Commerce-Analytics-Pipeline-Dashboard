name: dbt CI Pipeline

# ─────────────────────────────────────────────
# WHEN does this workflow run?
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main        # Runs every time you push to main branch
  pull_request:
    branches:
      - main        # Runs on every pull request to main

# ─────────────────────────────────────────────
# WHAT does this workflow do?
# ─────────────────────────────────────────────
jobs:
  dbt-run:
    name: Run dbt Models on Neon
    runs-on: ubuntu-latest    # GitHub spins up a fresh Ubuntu virtual machine

    steps:

      # Step 1: Download your code onto the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python (dbt needs it)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dbt with the PostgreSQL adapter
      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.9.0

      # Step 4: Create the profiles.yml file on the fly
      # (We can't push profiles.yml to GitHub because it has secrets)
      # So we BUILD it dynamically using the GitHub Secrets you'll add in Step 5
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dbt_ecomm:
            outputs:
              prod:
                type: postgres
                host: ${{ secrets.NEON_HOST }}
                port: 5432
                dbname: ${{ secrets.NEON_DBNAME }}
                user: ${{ secrets.NEON_USER }}
                pass: ${{ secrets.NEON_PASSWORD }}
                schema: prod_schema
                threads: 4
                sslmode: require
            target: prod
          EOF

      # Step 5: Run dbt — builds all your models on Neon
      - name: Run dbt models
        run: |
          dbt run --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod

      # Step 6: Run dbt source freshness & basic checks
      - name: dbt compile check
        run: |
          dbt compile --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod
