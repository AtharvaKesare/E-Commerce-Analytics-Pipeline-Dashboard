name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-run:
    name: Run dbt Models on Neon
    runs-on: ubuntu-latest

    env:
      NEON_HOST: ${{ secrets.NEON_HOST }}
      NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
      NEON_USER: ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.9.0

      # Simplest possible approach — no heredoc, no f-strings, just echo
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          {
            echo "dbt_ecomm:"
            echo "  outputs:"
            echo "    prod:"
            echo "      type: postgres"
            echo "      host: $NEON_HOST"
            echo "      port: 5432"
            echo "      dbname: $NEON_DBNAME"
            echo "      user: $NEON_USER"
            echo "      pass: $NEON_PASSWORD"
            echo "      schema: prod_schema"
            echo "      threads: 4"
            echo "      sslmode: require"
            echo "  target: prod"
          } > ~/.dbt/profiles.yml

      # DEBUG: Show exactly what's in profiles.yml (password masked)
      - name: Debug - Show profiles.yml content
        run: |
          echo "=== profiles.yml content ==="
          cat ~/.dbt/profiles.yml | sed "s/$NEON_PASSWORD/[MASKED]/g"
          echo ""
          echo "Password length: ${#NEON_PASSWORD} chars"
          echo "Host being used: $NEON_HOST"

      # DEBUG: Test raw PostgreSQL connection before running dbt
      - name: Debug - Test Neon connection directly
        run: |
          pip install psycopg2-binary -q
          python3 -c "
          import psycopg2, os
          try:
              conn = psycopg2.connect(
                  host=os.environ['NEON_HOST'],
                  port=5432,
                  dbname=os.environ['NEON_DBNAME'],
                  user=os.environ['NEON_USER'],
                  password=os.environ['NEON_PASSWORD'],
                  sslmode='require',
                  connect_timeout=10
              )
              print('SUCCESS: Connected to Neon!')
              conn.close()
          except Exception as e:
              print(f'FAILED: {e}')
              exit(1)
          "

      - name: Run dbt models
        run: dbt run --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod

      - name: dbt compile check
        run: dbt compile --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod
