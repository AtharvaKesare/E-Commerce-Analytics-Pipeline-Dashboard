name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-run:
    name: Run dbt Models on Neon
    runs-on: ubuntu-latest

    env:
      NEON_HOST: ${{ secrets.NEON_HOST }}
      NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
      NEON_USER: ${{ secrets.NEON_USER }}
      NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.9.0

      # Use Python to write profiles.yml — handles ALL special characters safely
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          python3 - << 'PYEOF'
          import os

          host     = os.environ["NEON_HOST"]
          dbname   = os.environ["NEON_DBNAME"]
          user     = os.environ["NEON_USER"]
          password = os.environ["NEON_PASSWORD"]

          profile = f"""dbt_ecomm:
            outputs:
              prod:
                type: postgres
                host: {host}
                port: 5432
                dbname: {dbname}
                user: {user}
                pass: '{password}'
                schema: prod_schema
                threads: 4
                sslmode: require
            target: prod
          """

          path = os.path.expanduser("~/.dbt/profiles.yml")
          with open(path, "w") as f:
              f.write(profile)

          print(f"profiles.yml written to {path}")
          print(f"Host: {host}")
          print(f"DB:   {dbname}")
          print(f"User: {user}")
          print(f"Pass: {'*' * len(password)} ({len(password)} chars)")
          PYEOF

      - name: Run dbt models
        run: dbt run --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod

      - name: dbt compile check
        run: dbt compile --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target prod

