name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-run:
    name: Run dbt Models
    runs-on: ubuntu-latest

    # GitHub spins up a fresh PostgreSQL container automatically!
    # No Neon needed — no channel_binding issues, no external credentials
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dbt_user
          POSTGRES_PASSWORD: dbt_password
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-postgres
        run: pip install dbt-core==1.11.6 dbt-postgres==1.10.0

      # Create profiles.yml pointing to the GitHub Actions PostgreSQL
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          {
            echo "dbt_ecomm:"
            echo "  outputs:"
            echo "    ci:"
            echo "      type: postgres"
            echo "      host: localhost"
            echo "      port: 5432"
            echo "      dbname: ecommerce"
            echo "      user: dbt_user"
            echo "      pass: dbt_password"
            echo "      schema: ci_schema"
            echo "      threads: 4"
            echo "  target: ci"
          } > ~/.dbt/profiles.yml

      - name: Run dbt seed
        run: dbt seed --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target ci

      - name: Run dbt models
        run: dbt run --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target ci

      - name: dbt compile check
        run: dbt compile --project-dir dbt_project/dbt_ecomm --profiles-dir ~/.dbt --target ci

